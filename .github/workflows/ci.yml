name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas pyarrow matplotlib tqdm

      - name: Syntax Lint
        run: python -m compileall -q src scripts tests

      - name: Run Tests (includes CLI smoke backtest)
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q
